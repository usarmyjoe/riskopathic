version: "3.8"

services:
  riskopathic:
    build: .
    container_name: riskopathic
    ports:
      - "8080:8080"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=changeme123
    networks:
      - graphnet
    restart: unless-stopped

networks:
  graphnet:
    external: true
    name: graphnet
